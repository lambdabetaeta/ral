name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Render site index
        run: python3 scripts/render-site-index.py
      - name: Stage web assets
        run: |
          mkdir -p site/scripts
          cp scripts/install.sh site/scripts/install.sh
          cp docs/SPEC.md site/SPEC.md
          cp docs/RATIONALE.md site/RATIONALE.md
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deploy
