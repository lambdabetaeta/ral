# Permissive macOS developer profile for exarch.  Sample.
#
# Lists every effect capability you typically need to build software:
# common toolchains (Rust, C/C++, Python, Node, Go, Ruby), source
# control, network fetch, shells, archive tools, container runtimes.
#
# Two ways to use this file, depending on which lattice phase you
# want it to participate in:
#
#  1. As a ceiling extension on top of `reasonable` (recommended for
#     adding allowances without dropping reasonable's defaults):
#
#         exarch --extend-base exarch/data/dev-mac.exarch.toml
#
#     The file's allowances are joined into the reasonable ceiling.
#
#  2. As the entire ceiling, on top of dangerous (when you don't
#     want any of reasonable's defaults; `dangerous ⊓ file = file`):
#
#         exarch --base dangerous --restrict exarch/data/dev-mac.exarch.toml
#
# Tighten further per project by passing additional `--restrict <FILE>`
# flags (repeatable; meet is commutative).
#
# Tilde paths are expanded by ral's `resolve_grant_path` at runtime.
#
# Note: ral's exec gate fires only on top-level spawns — children
# inherit the Seatbelt profile and exec freely.  Whitelisting the
# *driver* (cargo / make / npm / …) is enough; rustc, cc, ld, ar are
# reachable automatically as cargo's children.

audit = false
net   = true

[shell]
chdir = true

# ── Filesystem ────────────────────────────────────────────────────────────

[fs]
# Reads outside system paths (which macOS Seatbelt grants by default).
read_prefixes = [
  "~/.cargo",
  "~/.rustup",
  "~/.npm",
  "~/.cache",
  "~/Library/Caches",
  "~/.local",
  "~/go",
  "~/.gem",
  "~/.bundle",
  "~/.gradle",
  "~/.m2",
  "~/.pyenv",
  "~/.rbenv",
  "~/.nvm",
  "~/.config",
  "/opt/homebrew",
  "/usr/local",
]

# Writes for build/cache directories.  cwd + /tmp are added by
# `default_caps` already.
write_prefixes = [
  "~/.cargo",
  "~/.npm",
  "~/.cache",
  "~/Library/Caches",
  "~/.local",
  "~/go/pkg",
  "~/.gem",
  "~/.bundle",
  "~/.gradle/caches",
  "~/.m2/repository",
]

# Add invariants here that should be unwritable even when a
# covering write_prefix would otherwise permit it (lockfiles, signed
# manifests, …).  `for_invocation` also appends every loaded
# `--restrict` file's path to this list automatically.
deny_paths = []

# ── Exec drivers ──────────────────────────────────────────────────────────
#
# Each entry is a top-level command name.  ExecPolicy.Allow means "any
# args".  Subcommands lists are an option but rarely worth the noise
# at this layer.

[exec]
# Build drivers (children: rustc, cc, ld, ar, ranlib, lld, …)
cargo      = "Allow"
rustc      = "Allow"
rustup     = "Allow"
clippy     = "Allow"
rustfmt    = "Allow"

# C / C++
cc         = "Allow"
gcc        = "Allow"
clang      = "Allow"
"clang++"  = "Allow"
"g++"      = "Allow"
ld         = "Allow"
ar         = "Allow"
ranlib     = "Allow"
nm         = "Allow"
strip      = "Allow"
otool      = "Allow"
dsymutil   = "Allow"
install_name_tool = "Allow"
lipo       = "Allow"
libtool    = "Allow"
as         = "Allow"
pkg-config = "Allow"
pkgconf    = "Allow"

# Build systems
make       = "Allow"
gmake      = "Allow"
cmake      = "Allow"
ninja      = "Allow"
meson      = "Allow"
autoconf   = "Allow"
automake   = "Allow"

# Source control + collaboration
git        = "Allow"
gh         = "Allow"

# Network fetch
curl       = "Allow"
wget       = "Allow"

# Shells (build scripts, husky hooks, …)
sh         = "Allow"
bash       = "Allow"
zsh        = "Allow"
dash       = "Allow"

# Python
python     = "Allow"
python3    = "Allow"
pip        = "Allow"
pip3       = "Allow"
pipx       = "Allow"
poetry     = "Allow"
uv         = "Allow"
pytest     = "Allow"
ruff       = "Allow"
mypy       = "Allow"
black      = "Allow"

# Node.js
node       = "Allow"
npm        = "Allow"
npx        = "Allow"
yarn       = "Allow"
pnpm       = "Allow"
bun        = "Allow"
deno       = "Allow"
tsc        = "Allow"

# Go
go         = "Allow"
gofmt      = "Allow"

# Ruby
ruby       = "Allow"
gem        = "Allow"
bundle     = "Allow"
rake       = "Allow"

# Search / structured-text tools
rg         = "Allow"
fd         = "Allow"
jq         = "Allow"
yq         = "Allow"
awk        = "Allow"
gawk       = "Allow"
fzf        = "Allow"

# Resolve / inspect
which      = "Allow"
command    = "Allow"
type       = "Allow"
file       = "Allow"
xargs      = "Allow"
find       = "Allow"
locate     = "Allow"

# Process inspection / control
ps         = "Allow"
lsof       = "Allow"
fuser      = "Allow"
pgrep      = "Allow"
pkill      = "Allow"
kill       = "Allow"
top        = "Allow"
htop       = "Allow"
watch      = "Allow"

# Archive
tar        = "Allow"
gzip       = "Allow"
gunzip     = "Allow"
bzip2      = "Allow"
bunzip2    = "Allow"
xz         = "Allow"
zstd       = "Allow"
zip        = "Allow"
unzip      = "Allow"
"7z"       = "Allow"

# Diff / patch
diff       = "Allow"
patch      = "Allow"
delta      = "Allow"

# Containers
docker     = "Allow"
podman     = "Allow"
docker-compose = "Allow"

# LSP / format servers (often invoked under cargo / vscode but also
# reachable as top-level when scripting)
rust-analyzer = "Allow"
clangd     = "Allow"
prettier   = "Allow"
eslint     = "Allow"

# Misc
man        = "Allow"
less       = "Allow"
more       = "Allow"
time       = "Allow"
gtime      = "Allow"
