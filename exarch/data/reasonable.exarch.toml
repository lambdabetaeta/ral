# Shells
sh           = "Allow"
bash         = "Deny"
zsh          = "Deny"

# Version control
git          = "Allow"
gh           = "Allow"

# Net fetch
curl         = "Allow"
wget         = "Allow"

# Search / inspect
rg           = "Allow"
fd           = "Allow"
jq           = "Allow"
yq           = "Allow"
awk          = "Allow"
gawk         = "Allow"
find         = "Allow"
xargs        = "Allow"
file         = "Allow"
which        = "Allow"

# Scripting runtimes (one-off scripts, common as tooling)
python       = "Allow"
python3      = "Allow"

# Archives
tar          = "Allow"
gzip         = "Allow"
gunzip       = "Allow"
bzip2        = "Allow"
bunzip2      = "Allow"
xz           = "Allow"
zip          = "Allow"
unzip        = "Allow"

# Diff / patch / docs
diff         = "Allow"
patch        = "Allow"
less         = "Allow"
more         = "Allow"
man          = "Allow"

# Process inspection (read-only)
ps           = "Allow"
lsof         = "Allow"
pgrep        = "Allow"
