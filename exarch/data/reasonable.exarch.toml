printenv     = "Allow"
printf       = "Allow"
ptx          = "Allow"
pwd          = "Allow"
readlink     = "Allow"
realpath     = "Allow"
rm           = "Allow"
rmdir        = "Allow"
seq          = "Allow"
sha1sum      = "Allow"
sha224sum    = "Allow"
sha256sum    = "Allow"
sha384sum    = "Allow"
sha512sum    = "Allow"
shred        = "Allow"
shuf         = "Allow"
sleep        = "Allow"
sort         = "Allow"
sum          = "Allow"
