# Shells
sh           = "Deny"
bash         = "Deny"
zsh          = "Deny"

# Version control
git          = "Allow"
gh           = "Allow"

# Net fetch
curl         = "Allow"
wget         = "Allow"

# Search / inspect
rg           = "Allow"
fd           = "Allow"
jq           = "Allow"
yq           = "Allow"
awk          = "Allow"
gawk         = "Allow"
find         = "Allow"
xargs        = "Allow"
