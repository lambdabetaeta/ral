# Scripting runtimes (one-off scripts, common as tooling)
python       = "Allow"
python3      = "Allow"

# Archives
tar          = "Allow"
gzip         = "Allow"
gunzip       = "Allow"
bzip2        = "Allow"
bunzip2      = "Allow"
xz           = "Allow"
zip          = "Allow"
