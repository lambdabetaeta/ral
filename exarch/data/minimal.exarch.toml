# `minimal` bake-in.  Coreutils on exec, net on, chdir allowed.  The
# resolver fills in fs prefixes (cwd + /tmp + tempdir) at runtime —
# they cannot be expressed statically since cwd is per-invocation.
#
# Edit this file to change what `--base minimal` allows.  The contents
# are baked into the exarch binary at build time via `include_str!`.

audit = false
net = true

[shell]
chdir = true

[exec]
arch         = "Allow"
b2sum        = "Allow"
base32       = "Allow"
base64       = "Allow"
basename     = "Allow"
basenc       = "Allow"
cat          = "Allow"
cksum        = "Allow"
comm         = "Allow"
cp           = "Allow"
csplit       = "Allow"
cut          = "Allow"
date         = "Allow"
df           = "Allow"
dir          = "Allow"
dircolors    = "Allow"
dirname      = "Allow"
du           = "Allow"
echo         = "Allow"
env          = "Allow"
expand       = "Allow"
expr         = "Allow"
factor       = "Allow"
fmt          = "Allow"
fold         = "Allow"
head         = "Allow"
hostname     = "Allow"
join         = "Allow"
link         = "Allow"
ln           = "Allow"
ls           = "Allow"
md5sum       = "Allow"
mkdir        = "Allow"
mktemp       = "Allow"
mv           = "Allow"
nl           = "Allow"
nproc        = "Allow"
numfmt       = "Allow"
od           = "Allow"
paste        = "Allow"
pr           = "Allow"
printenv     = "Allow"
printf       = "Allow"
ptx          = "Allow"
pwd          = "Allow"
readlink     = "Allow"
realpath     = "Allow"
rm           = "Allow"
rmdir        = "Allow"
seq          = "Allow"
sha1sum      = "Allow"
sha224sum    = "Allow"
sha256sum    = "Allow"
sha384sum    = "Allow"
sha512sum    = "Allow"
shred        = "Allow"
shuf         = "Allow"
sleep        = "Allow"
sort         = "Allow"
sum          = "Allow"
sync         = "Allow"
tac          = "Allow"
tail         = "Allow"
tee          = "Allow"
test         = "Allow"
touch        = "Allow"
tr           = "Allow"
truncate     = "Allow"
tsort        = "Allow"
uname        = "Allow"
unexpand     = "Allow"
uniq         = "Allow"
unlink       = "Allow"
vdir         = "Allow"
wc           = "Allow"
whoami       = "Allow"
yes          = "Allow"
