# Local-build variant: compile exarch from this checkout (via shell-dev)
# and bake the resulting binary into the image.  Kept for posterity —
# the default compose.yaml fetches a release binary, which is what you
# almost always want.  Use this when iterating on exarch sources and
# wanting to test the change inside the dangerous-mode container.
#
# Build:
#   exarch/docker/build.sh             # binary from shell-dev → image
#
# Run:
#   docker compose -f exarch/docker/compose.local.yaml run --rm exarch-box-local
#   docker compose -f exarch/docker/compose.local.yaml run --rm exarch-box-local \
#       --provider openai -p "do the thing"
#
# Override the workspace location with $EXARCH_WORKSPACE; the default
# `./workspace` is sibling to this file and gitignored.

services:
  exarch-box-local:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: exarch-box-local
    container_name: exarch-box-local

    environment:
      # Keys are passed through from the host env (no value = inherit).
      # The entrypoint refuses to start unless ≥ 1 of these is set.
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY

    volumes:
      - ${EXARCH_WORKSPACE:-./workspace}:/work

    working_dir: /work
    stdin_open: true
    tty: true
    init: true

    # ── Hardening ────────────────────────────────────────────────────
    # Container is the trust boundary, but the agent inside it is still
    # untrusted: lock the box down to the bare minimum it needs.
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
      - /home/exarch:rw,nosuid,nodev,size=128m
    pids_limit: 1024
    mem_limit: ${EXARCH_MEMORY:-4g}
    memswap_limit: ${EXARCH_MEMORY:-4g}
