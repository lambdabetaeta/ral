# Hardened container that runs exarch in permissive mode (entrypoint
# defaults to `--base everything`).  The binary is fetched from a
# GitHub Release at build time — no `shell-dev`, no rust toolchain.
#
# Build (rolling latest):
#   docker compose -f exarch/docker/compose.yaml build
#
# Build a pinned tag:
#   docker compose -f exarch/docker/compose.yaml build \
#       --build-arg EXARCH_VERSION=v0.1.0
#
# Run:
#   docker compose -f exarch/docker/compose.yaml run --rm exarch-box
#
# For local iteration on exarch sources, see compose.local.yaml.

services:
  exarch-box:
    build:
      context: .
      args:
        EXARCH_VERSION: ${EXARCH_VERSION:-latest}
        EXARCH_REPO: ${EXARCH_REPO:-lambdabetaeta/ral}
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
        EXARCH_PROVIDER: ${EXARCH_PROVIDER:-}
        EXARCH_MODEL: ${EXARCH_MODEL:-}
    image: exarch-box
    container_name: exarch-box

    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY
      - EXARCH_PROVIDER
      - EXARCH_MODEL

    volumes:
      - ${EXARCH_WORKSPACE:-./workspace}:/work

    working_dir: /work
    stdin_open: true
    tty: true
    init: true

    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
      - /home/exarch:rw,nosuid,nodev,size=128m
    pids_limit: 1024
    mem_limit: ${EXARCH_MEMORY:-4g}
    memswap_limit: ${EXARCH_MEMORY:-4g}
