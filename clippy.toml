# Path-handling discipline: every canonicalisation goes through
# `core::path::canon`, where it picks `canonicalise_strict` or
# `canonicalise_lenient` and names its intent at the call site.
#
# A direct `std::fs::canonicalize` elsewhere bypasses that
# distinction and re-opens the bypass-by-direct-call class of
# bugs the path/ consolidation closed.  The two real callers in
# `core/src/path/canon.rs` carry an `#[allow(clippy::disallowed_methods)]`
# attribute so the lint fires only outside that file.
#
# CWD discipline: process CWD has exactly one home (the OS).  Reading
# it should go through `Shell::cwd` so it can never be cached in a
# shell-scoped, roll-back-on-return store — that's how `$env[PWD]`
# went stale across thunks.  Genuine syscall sites (`Shell::cwd`,
# `Shell::apply_chdir`, the two `seed_default_env` startups, the path
# resolver fallback, and the exarch host snapshot) carry an
# `#[allow]` so the lint fires only outside those.
disallowed-methods = [
    { path = "std::fs::canonicalize", reason = "Use crate::path::canon::canonicalise_strict (file must exist) or canonicalise_lenient (ancestor-walk fallback). Both name the call-site intent and keep the discipline of one canonicaliser per shape." },
    { path = "std::env::current_dir", reason = "Use Shell::cwd() — process CWD must not be cached in any shell-scoped store; that's how PWD went stale across thunks." },
]
