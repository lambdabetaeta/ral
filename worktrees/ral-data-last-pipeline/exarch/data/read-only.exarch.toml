# `read-only` bake-in.  Same shape as `reasonable` for reads and
# exec, but the agent cannot modify the project tree — writes are
# restricted to scratch directories only.
#
# Use when the agent's job is to investigate, review, or report on a
# tree without modifying it: code review, audit, "explain this
# repo", static analysis flows.  Network is on so the agent can
# fetch context (e.g. `gh pr view`, fetch upstream docs).
#
# To allow writes for a specific subtree, layer a `--restrict` (which
# can only further attenuate, not widen).  To start broader, use
# `reasonable` and lock down via deny_paths.

audit = false
net   = true

[shell]
chdir = true

# Reads as broad as `reasonable`: the agent should be able to read
# the full project tree, system caches, tool configs.  All the
# usual toolchain caches stay readable so e.g. `cargo metadata`
# can resolve without rebuilding.
[fs]
read_prefixes = [
  "cwd:",                  # the project tree the agent is reviewing
  "/tmp",
  "tempdir:",              # `$TMPDIR` on macOS — distinct from /tmp
  "xdg:config",            # ${XDG_CONFIG_HOME:-~/.config}
  "xdg:data",              # ${XDG_DATA_HOME:-~/.local/share}
  "xdg:cache",             # ${XDG_CACHE_HOME:-~/.cache}
  "xdg:state",             # ${XDG_STATE_HOME:-~/.local/state}
  "xdg:bin",               # ${XDG_BIN_HOME:-~/.local/bin}
  "~/Library/Caches",      # macOS-native CLI caches outside the XDG world
  "~/.cargo/registry",
  "~/.cargo/git",
  "~/.rustup",
  "~/go",
  "~/.npm",
  "~/.gem",
  "~/.bundle",
  "~/.gradle/caches",
  "~/.m2/repository",
  "~/.pyenv",
  "~/.rbenv",
  "~/.nvm",
]

# Writes only to scratch — the project tree is off-limits.  This is
# the load-bearing difference vs `reasonable`: `cwd:` is read-only,
# and any tool that wants to modify the tree fails closed.  Tools
# that need a workspace can use `$EXARCH_SCRATCH` (under
# `tempdir:`) as their scratch root.
write_prefixes = [
  "/tmp",
  "tempdir:",
]

# Same credential carve-outs as `reasonable`: these are present in
# `xdg:config` (read above) but the contents are OAuth tokens and
# session secrets the agent should never see, even read-only.
deny_paths = [
  "xdg:config/gh",         # gh CLI — hosts.yml has the GitHub OAuth token
  "xdg:config/op",         # 1Password CLI session
  "xdg:config/gcloud",     # Google Cloud SDK OAuth
]

# Exec mirrors `reasonable` — the agent has the same toolset.  No
# write capability means `rm`, `mv`, `cp`, `mkdir`, `touch`,
# `truncate`, `shred` and friends are still admitted as commands but
# fail at the fs gate when their target lies under `cwd:`.  This is
# intentional: the agent can attempt the action and observe the
# denial, rather than having "tool not found" surprise.
[exec]
"xdg:bin/"            = "Allow"
"/usr/bin/"           = "Allow"
"/bin/"               = "Allow"
"/usr/local/bin/"     = "Allow"
"/opt/homebrew/bin/"  = "Allow"
"/opt/homebrew/sbin/" = "Allow"
"/usr/local/sbin/"    = "Allow"
"/usr/sbin/"          = "Allow"
"/sbin/"              = "Allow"
"cwd:/"               = "Allow"
"/tmp/"               = "Allow"
"tempdir:/"           = "Allow"

# Coreutils
arch         = "Allow"
b2sum        = "Allow"
base32       = "Allow"
base64       = "Allow"
basename     = "Allow"
basenc       = "Allow"
cat          = "Allow"
cksum        = "Allow"
comm         = "Allow"
cp           = "Allow"
csplit       = "Allow"
cut          = "Allow"
date         = "Allow"
df           = "Allow"
dir          = "Allow"
dircolors    = "Allow"
dirname      = "Allow"
du           = "Allow"
echo         = "Allow"
env          = "Allow"
expand       = "Allow"
expr         = "Allow"
factor       = "Allow"
fmt          = "Allow"
fold         = "Allow"
head         = "Allow"
hostname     = "Allow"
join         = "Allow"
link         = "Allow"
ln           = "Allow"
ls           = "Allow"
md5sum       = "Allow"
mkdir        = "Allow"
mktemp       = "Allow"
mv           = "Allow"
nl           = "Allow"
nproc        = "Allow"
numfmt       = "Allow"
od           = "Allow"
paste        = "Allow"
pr           = "Allow"
printenv     = "Allow"
printf       = "Allow"
ptx          = "Allow"
pwd          = "Allow"
readlink     = "Allow"
realpath     = "Allow"
rm           = "Allow"
rmdir        = "Allow"
seq          = "Allow"
sha1sum      = "Allow"
sha224sum    = "Allow"
sha256sum    = "Allow"
sha384sum    = "Allow"
sha512sum    = "Allow"
shred        = "Allow"
shuf         = "Allow"
sleep        = "Allow"
sort         = "Allow"
sum          = "Allow"
sync         = "Allow"
tac          = "Allow"
tail         = "Allow"
tee          = "Allow"
test         = "Allow"
touch        = "Allow"
tr           = "Allow"
truncate     = "Allow"
tsort        = "Allow"
uname        = "Allow"
unexpand     = "Allow"
uniq         = "Allow"
unlink       = "Allow"
vdir         = "Allow"
wc           = "Allow"
whoami       = "Allow"
yes          = "Allow"

# Shells
sh           = "Allow"
bash         = "Deny"
zsh          = "Deny"

# Version control
git          = "Allow"
gh           = "Allow"

# Net fetch
curl         = "Allow"
wget         = "Allow"

# Search / inspect
rg           = "Allow"
fd           = "Allow"
jq           = "Allow"
yq           = "Allow"
awk          = "Allow"
gawk         = "Allow"
find         = "Allow"
xargs        = "Allow"
file         = "Allow"
which        = "Allow"

# Scripting runtimes (one-off scripts, common as tooling)
python       = "Allow"
python3      = "Allow"

# Archives
tar          = "Allow"
gzip         = "Allow"
gunzip       = "Allow"
bzip2        = "Allow"
bunzip2      = "Allow"
xz           = "Allow"
zip          = "Allow"
unzip        = "Allow"

# Diff / patch / docs
diff         = "Allow"
patch        = "Allow"
less         = "Allow"
more         = "Allow"
man          = "Allow"

# Process inspection (read-only)
ps           = "Allow"
lsof         = "Allow"
pgrep        = "Allow"
